name: prime
base: core22
version: '1.0'
summary: Aplikacija za racunanje prostih brojeva
description: |
  Ovo je studentski projekt za kolegij Napredne tehnike programiranja.
  Zapakirano automatski preko GitHub Actions.

grade: devel
confinement: devmode

apps:
  prime:
    command: bin/python3 $SNAP/main.py  

parts:
  moj-kod:
    plugin: python
    source: .
    
    stage-packages:
      - python3
      - python3-minimal
      - python3-distutils
