name: exam-grader-app
base: core22
version: '1.0'
summary: Automatizirano ocjenjivanje ispita (Tkinter GUI)
description: Tkinter GUI aplikacija za ocjenjivanje ispita

grade: stable
confinement: strict

apps:
  exam-grader-app:
    command: usr/bin/python3 $SNAP/grader_project.py
    plugs:
      - home
      - x11
      - desktop
      - wayland

parts:
  moj-kod:
    plugin: dump
    source: .
    stage-packages:
      - python3
      - python3-tk
