name: prime
base: core22
version: "1.0"
summary: Aplikacija za ocjenjivanje ispita
description: Studentski projekt

grade: devel
confinement: devmode

apps:
  prime:
    command: usr/bin/python3 $SNAP/gui_grader.py
    extensions: [gnome]
    environment:
      PYTHONPATH: $SNAP/usr/lib/python3/dist-packages:$SNAP/usr/lib/python3.10/dist-packages
    plugs:
      - home
      - removable-media

parts:
  app:
    plugin: dump
    source: .
    stage-packages:
      - python3-tk