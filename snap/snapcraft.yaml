name: exam-grader-app
base: core22
version: '1.0'
summary: Projekt za automatizirano ocjenjivanje ispita
description: Tkinter GUI aplikacija za ocjenjivanje ispita i obradu rezultata

grade: stable
confinement: strict

apps:
  exam-grader-app:
    command: python3 grader_project.py
    plugs:
      - home
      - x11
      - desktop
      - wayland

parts:
  moj-kod:
    plugin: dump
    source: .
    stage-packages:
      - python3
      - python3-tk