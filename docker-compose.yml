services:
  app:
    build: .
    container_name: exam-grader-container
    image: exam-grader-app:latest
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/app
    restart: "no"
