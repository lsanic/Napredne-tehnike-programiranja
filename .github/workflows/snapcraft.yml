name: Build Snap
on: [push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout kod
      uses: actions/checkout@v4

    - name: Build Snap paket
      uses: snapcore/action-build@v1
      id: snapcraft
      with:
        snapcraft-args: 'pack --destructive-mode'

    - name: Spremi .snap file kao artifakt
      uses: actions/upload-artifact@v4
      with:
        name: moj-snap-paket
        path: ./*.snap
