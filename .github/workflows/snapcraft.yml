name: Build Snap

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build snap
        run: snapcraft pack --destructive-mode

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package
          path: "*.snap"
