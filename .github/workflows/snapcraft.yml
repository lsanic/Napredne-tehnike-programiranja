name: Build Snap
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kod
      uses: actions/checkout@v4

    - name: Instalacija Snapcrafta
      run: |
        sudo snap install snapcraft --classic

    - name: Pokreni Build bez LXD-a
      run: |
        snapcraft pack --destructive-mode

    - name: Spremi .snap file kao artifakt
      uses: actions/upload-artifact@v4
      with:
        name: moj-snap-paket
        path: ./*.snap
