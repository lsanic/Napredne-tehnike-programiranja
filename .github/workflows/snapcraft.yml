name: Build Snap

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snapcraft
        run: |
          sudo snap install snapcraft --classic

      - name: Build Snap
        run: |
          snapcraft

      - name: Upload Snap
        uses: actions/upload-artifact@v4
        with:
          name: prime-snap
          path: "*.snap"
