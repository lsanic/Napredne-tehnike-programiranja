name: Build Snap
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout kod
      uses: actions/checkout@v4

    - name: Pripremi snap okruženje i instaliraj baze
      run: |
        sudo snap install core22
        sudo snap install gtk-common-themes

    - name: Pokreni Build preko službene akcije
      uses: snapcore/action-build@v1

    - name: Spremi .snap file kao artifakt
      uses: actions/upload-artifact@v4
      with:
        name: moj-snap-paket
        path: ./*.snap
